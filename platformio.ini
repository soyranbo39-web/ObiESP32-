; PlatformIO Project Configuration File
;
; ESP32 + ESP32-C3 workspace
;
; Build examples:
;   pio run -e esp32
;   pio run -e esp32c3
;
; Upload examples:
;   pio run -e esp32 -t upload
;   pio run -e esp32c3 -t upload
;
; Monitor examples:
;   pio device monitor -b 115200

[platformio]
default_envs = esp32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson @ ^6.21.5
  knolleary/PubSubClient @ ^2.8

[env:esp32]
board = esp32dev
build_flags =
  -D PIN_LED_RIEGO=26
  -D PIN_LED_VENTILADOR=27
  -D DEVICE_ID=\"esp32-01\"

[env:esp32c3]
board = esp32-c3-devkitm-1
upload_speed = 115200
build_flags =
  -D PIN_LED_RIEGO=4
  -D PIN_LED_VENTILADOR=5
  -D DEVICE_ID=\"esp32c3-01\"
